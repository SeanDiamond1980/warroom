<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The $30 Pool — 2026 War Room</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#090c10;--bg2:#101318;--bg3:#171b22;--bg4:#1e2330;
  --border:#232835;--border2:#2d3548;
  --text:#cdd6f0;--text2:#7a8baa;--text3:#3e4a60;
  --accent:#4f8ef7;--accent2:#1a2d52;
  --green:#3ecf6e;--green2:#0f2e1c;--green3:#1a4d2e;
  --red:#f05252;--red2:#2e0f0f;
  --amber:#f5a623;--amber2:#2e1c06;
  --purple:#a78bfa;--purple2:#1f1540;
  --cyan:#22d3ee;--cyan2:#082830;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
  --radius:5px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh;}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* HEADER */
header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 1.4rem;display:flex;align-items:center;
  justify-content:space-between;height:50px;
  position:sticky;top:0;z-index:200;gap:1rem;
}
.logo{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);
  letter-spacing:.09em;text-transform:uppercase;white-space:nowrap;}
.logo em{color:var(--text3);font-style:normal;font-weight:400;}
.hdr-stats{display:flex;gap:1.2rem;align-items:center;flex-shrink:0;}
.hs{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.hs-l{font-size:8.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);}
.hs-v{font-family:var(--mono);font-size:14px;font-weight:600;}
.hs-v.g{color:var(--green);}
.hs-v.a{color:var(--amber);}
.hs-v.c{color:var(--cyan);font-size:11px;}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--green3);
  border:1px solid var(--green);border-radius:var(--radius);padding:.5rem 1rem;
  font-family:var(--mono);font-size:11px;color:var(--green);z-index:999;
  opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}

/* NAV */
nav{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 1.4rem;display:flex;gap:0;overflow-x:auto;position:sticky;top:50px;z-index:199;}
nav::-webkit-scrollbar{display:none;}
.ntab{
  padding:0 1rem;height:38px;display:flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.05em;
  color:var(--text3);cursor:pointer;border:none;border-bottom:2px solid transparent;
  background:none;white-space:nowrap;transition:color .12s,border-color .12s;
}
.ntab:hover{color:var(--text2);}
.ntab.active{color:var(--accent);border-bottom-color:var(--accent);}
.ntab .nb{
  background:var(--bg3);border:1px solid var(--border2);border-radius:3px;
  padding:1px 5px;font-size:8.5px;font-weight:600;
}
.ntab.active .nb{background:var(--accent2);border-color:var(--accent);color:var(--accent);}

/* MAIN */
main{padding:1.1rem 1.4rem;max-width:1480px;}

/* KEPT BAR */
.kept-bar{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
  padding:.55rem .85rem;margin-bottom:.75rem;font-size:11px;color:var(--text2);line-height:1.75;
}
.kept-bar strong{color:var(--red);font-size:8.5px;text-transform:uppercase;
  letter-spacing:.1em;font-weight:600;margin-right:5px;font-family:var(--mono);}
.kn{color:var(--text);}
.ko{color:var(--text3);font-family:var(--mono);font-size:9.5px;}

/* MARKET NOTE */
.mkt{border-left:2px solid var(--accent);padding:.4rem .75rem;margin-bottom:.75rem;
  font-size:11.5px;color:var(--text2);line-height:1.55;}

/* TABLE */
.tw{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--bg3);}
th{padding:6px 7px;text-align:left;font-family:var(--mono);font-size:9px;font-weight:500;
  color:var(--text3);letter-spacing:.09em;text-transform:uppercase;
  border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:7px 7px;border-bottom:1px solid var(--border);vertical-align:top;font-size:12px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(79,142,247,.035);}
.t1 td:first-child{border-left:3px solid var(--purple);}
.t2 td:first-child{border-left:3px solid var(--accent);}
.t3 td:first-child{border-left:3px solid var(--border2);}
.pn{font-weight:500;color:var(--text);}
.tm{font-family:var(--mono);font-size:9.5px;color:var(--text3);}
.mono{font-family:var(--mono);}
.note-cell{font-size:11px;color:var(--text2);line-height:1.4;white-space:normal;max-width:340px;}
.lp{color:var(--green);font-weight:500;font-family:var(--mono);}
.ln{color:var(--red);font-weight:500;font-family:var(--mono);}
.lu{color:var(--text3);font-family:var(--mono);}
.xv{font-family:var(--mono);font-weight:600;color:var(--cyan);}

/* PILLS */
.pill{display:inline-block;font-family:var(--mono);font-size:8.5px;font-weight:700;
  padding:2px 6px;border-radius:3px;letter-spacing:.05em;white-space:nowrap;}
.buy{background:var(--green2);color:var(--green);border:1px solid var(--green3);}
.tgt{background:var(--purple2);color:var(--purple);border:1px solid #3a2880;}
.sol{background:var(--accent2);color:var(--accent);border:1px solid #1e3a7a;}
.dep{background:var(--bg3);color:var(--text3);border:1px solid var(--border);}
.cau{background:var(--amber2);color:var(--amber);border:1px solid #4a2e08;}
.hot{background:#1a1a2e;color:var(--cyan);border:1px solid var(--cyan2);}
.watch{background:#1a1a1a;color:#888;border:1px solid #333;}

/* EDITABLE NOTES */
.edit-note{
  font-size:11px;color:var(--text2);line-height:1.4;
  white-space:pre-wrap;word-break:break-word;max-width:340px;
  outline:none;cursor:text;border-radius:3px;padding:2px 4px;
  transition:background .15s;min-width:80px;
}
.edit-note:focus{background:var(--bg4);color:var(--text);outline:1px solid var(--border2);}
.edit-note:empty:before{content:attr(data-ph);color:var(--text3);font-style:italic;}
.edit-badge{
  display:inline-block;font-family:var(--mono);font-size:8px;
  color:var(--text3);padding:1px 4px;border:1px solid var(--border);
  border-radius:2px;margin-left:4px;cursor:pointer;
  transition:color .12s,border-color .12s;
}
.edit-badge:hover{color:var(--amber);border-color:var(--amber);}

/* PROSPECT CARDS */
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:.8rem;margin-bottom:1.2rem;}
.pcard{
  background:var(--bg2);border:1px solid var(--border);border-radius:7px;
  padding:.95rem;position:relative;overflow:hidden;
}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--green),var(--accent));}
.pc-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px;}
.pc-meta{font-family:var(--mono);font-size:9.5px;color:var(--text3);
  margin-bottom:.7rem;display:flex;gap:8px;flex-wrap:wrap;}
.pc-meta span{color:var(--accent);}
.pc-stat{display:flex;justify-content:space-between;padding:3px 0;
  border-bottom:1px solid var(--border);font-size:11px;}
.pc-stat:last-of-type{border-bottom:none;}
.pc-stat .sl{color:var(--text3);font-size:9.5px;text-transform:uppercase;
  letter-spacing:.06em;font-family:var(--mono);}
.pc-stat .sv{font-family:var(--mono);font-weight:600;color:var(--green);}
.pc-action{margin-top:.7rem;padding:.35rem .6rem;background:var(--green2);
  border:1px solid var(--green3);border-radius:4px;font-family:var(--mono);
  font-size:9.5px;font-weight:700;color:var(--green);text-align:center;letter-spacing:.05em;}

/* WAIVER GRID */
.wgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:.8rem;margin-bottom:1.2rem;}
.wcard{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:.9rem;}
.wc-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;}
.wc-name{font-size:13px;font-weight:600;color:var(--text);}
.wc-tm{font-family:var(--mono);font-size:9.5px;color:var(--text3);margin-top:1px;}
.wc-eta{font-family:var(--mono);font-size:9.5px;padding:2px 7px;border-radius:3px;font-weight:700;}
.eta-now{background:var(--green2);color:var(--green);border:1px solid var(--green3);}
.eta-q1{background:var(--accent2);color:var(--accent);border:1px solid #1e3a7a;}
.eta-q2{background:var(--amber2);color:var(--amber);border:1px solid #4a2e08;}
.wc-stats{display:flex;gap:.8rem;margin-bottom:.6rem;flex-wrap:wrap;}
.wc-s{display:flex;flex-direction:column;gap:1px;}
.wc-s .wsl{font-size:8.5px;color:var(--text3);text-transform:uppercase;
  letter-spacing:.06em;font-family:var(--mono);}
.wc-s .wsv{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--cyan);}
.wc-note{font-size:11px;color:var(--text2);line-height:1.4;}
.wc-signal{display:flex;gap:4px;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;}

/* SECTION HEADERS */
.sec-hdr{
  font-family:var(--mono);font-size:9.5px;font-weight:600;text-transform:uppercase;
  letter-spacing:.1em;color:var(--text3);padding:.5rem 0 .4rem;
  margin-bottom:.5rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:7px;
}
.sec-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* BREAKOUT FRAMEWORK */
.bflex{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem;}
.bcard{background:var(--bg2);border:1px solid var(--border);border-radius:7px;
  padding:.85rem;flex:1;min-width:230px;}
.bc-name{font-size:13px;font-weight:600;color:var(--text);}
.bc-sub{font-family:var(--mono);font-size:9.5px;color:var(--text3);margin-bottom:.5rem;}
.sbar{display:flex;gap:3px;margin-bottom:4px;}
.sd{width:9px;height:9px;border-radius:50%;background:var(--border2);}
.sd.on{background:var(--green);}
.slab{font-family:var(--mono);font-size:8.5px;color:var(--text3);}
.bc-stats2{display:flex;gap:.7rem;margin-bottom:.6rem;flex-wrap:wrap;}
.bcs{display:flex;flex-direction:column;gap:1px;}
.bcs .bl{font-size:8.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);}
.bcs .bv{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--cyan);}
.bc-note2{font-size:11px;color:var(--text2);line-height:1.4;}

/* KEEPER SIGNALS */
.krow{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:1rem;}
.kcol{flex:1;min-width:220px;background:var(--bg2);border:1px solid var(--border);
  border-radius:7px;padding:.85rem;}
.kcol-hdr{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid var(--border);}
.kr{padding:5px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px;}
.kr:last-child{border-bottom:none;}
.kr-name{font-weight:500;color:var(--text);font-size:12px;}
.kr-meta{font-family:var(--mono);font-size:9.5px;color:var(--text3);}
.kr-note{font-size:10.5px;color:var(--text2);line-height:1.35;}

/* FOOTER */
footer{margin-top:2rem;padding:.85rem 1.4rem;border-top:1px solid var(--border);
  font-family:var(--mono);font-size:9.5px;color:var(--text3);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;}

@media(max-width:700px){
  header{padding:0 .8rem;height:auto;padding-top:.5rem;padding-bottom:.5rem;flex-wrap:wrap;}
  main{padding:.8rem;}
  nav{padding:0 .8rem;top:0;position:static;}
  .hdr-stats{gap:.8rem;}
  .note-cell,.edit-note{max-width:160px;}
}
.fb{padding:4px 10px;border-radius:3px;border:1px solid var(--border);font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text3);background:var(--bg3);cursor:pointer;transition:all .12s;}
.fa{border-color:var(--accent);color:var(--accent);background:var(--accent2);}
</style>
</head>

function saveNote(id, val) {
  notes[id] = val;
  try { localStorage.setItem(STORE_KEY, JSON.stringify(notes)); } catch(e){}
  showToast();
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 1800);
}

function noteHTML(id, defaultText) {
  const saved = notes[id];
  const val = saved !== undefined ? saved : (defaultText || '');
  const escaped = val.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<span
    class="edit-note"
    contenteditable="true"
    data-id="${id}"
    data-ph="Add your notes..."
    oninput="saveNote('${id}',this.innerText.trim())"
  >${escaped}</span>`;

function ls(v){
  if(v==null)return'<span class="lu">—</span>';
  const s=v>=0?`+${v.toFixed(3)}`:v.toFixed(3);
  return`<span class="${v>=0.015?'lp':v<=-0.015?'ln':'lu'}">${s}</span>`;
}
function pill(p){
  const m={buy:'buy',tgt:'tgt',sol:'sol',dep:'dep',cau:'cau',hot:'hot',watch:'watch',role:'tgt',spec:'cau',break:'buy'};
  const l={buy:'BUY',tgt:'TARGET',sol:'SOLID',dep:'DEPTH',cau:'CAUTION',hot:'HOT',watch:'WATCH',role:'ROLE',spec:'SPECL',break:'BREAK'};
  return`<span class="pill ${m[p]}">${l[p]}</span>`;
}
function tc(t){return t===1?'t1':t===2?'t2':'t3';}

function keptBar(kept){
  const names=kept.map(k=>`<span class="kn">${k.n}</span><span class="ko">(${k.o}·${k.tm})</span>`).join(' · ');
  return`<div class="kept-bar"><strong>⛔ Kept</strong>${names}</div>`;
}

function renderBat(pos){
  const d=POS_DATA[pos];
  let h=keptBar(d.kept)+`<div class="mkt">${d.note}</div><div class="tw"><table>
  <thead><tr><th style="width:16%">Player</th><th style="width:5%">Tm</th><th style="width:8%">Tier</th>
  <th style="width:7%">wOBA</th><th style="width:7%">xwOBA</th><th style="width:8%">Luck</th>
  <th style="width:8%">PwrLck</th><th style="width:4%">PA</th><th style="width:18%">Scouting note</th><th>Your notes</th>
  </tr></thead><tbody>`;
  d.players.forEach((r,i)=>{
    const nid=`bat_${pos}_${i}`;
    const pw=r.pw!=null?ls(r.pw):'<span class="lu">—</span>';
    h+=`<tr class="${tc(r.t)}">
      <td class="pn">${r.n}</td><td class="tm">${r.tm}</td><td>${pill(r.pl)}</td>
      <td class="mono">${r.w.toFixed(3)}</td><td class="xv">${r.x.toFixed(3)}</td>

}

const SIG_META = {
  UGLY:  {cls:"buy",  label:"Ugly Stats / Good Skills"},
  FLOOR: {cls:"sol",  label:"Reliable Floor"},
  ROLE:  {cls:"tgt",  label:"Role Upgrade 2026"},
  SPECL: {cls:"cau",  label:"Category Specialist"},
  BREAK: {cls:"buy",  label:"Breakout Signal"},
  CAUT:  {cls:"dep",  label:"Caution — Discount Only"},
};

const PRI_LABELS = {
  "SB":     {label:"Stolen Bases",         color:"#4A90D9"},
  "SB+BA":  {label:"SB + BA",              color:"#7B68EE"},
  "SB+SLOT":{label:"SB + Slot Flex",       color:"#5B9BD5"},
  "SV":     {label:"Saves (3rd Closer)",   color:"#E8A838"},
  "BA":     {label:"Batting Average",      color:"#5BAD6F"},
  "BA+C":   {label:"BA + Catcher",         color:"#4CA87A"},
  "BA+HR":  {label:"BA + Power",           color:"#78C278"},
  "HR":     {label:"Power",                color:"#999"},
  "K+ERA":  {label:"K Rate + ERA",         color:"#999"},
  "ERA+W":  {label:"ERA + Wins",           color:"#999"},
};

function renderMidTier() {
  // Group by priority section
  const sections = [
    {key:"SB",    label:"STOLEN BASES — You need ~20-30 more SB",       pris:["SB","SB+BA","SB+SLOT"]},
    {key:"SV",    label:"SAVES — Need a 3rd closer source",              pris:["SV"]},
    {key:"BA",    label:"BATTING AVERAGE — Counteract Raleigh's .245",   pris:["BA","BA+C","BA+HR"]},
    {key:"MULTI", label:"MULTI-CATEGORY + FLOOR PLAYS",                  pris:["HR","K+ERA","ERA+W"]},
  ];

  let h = `<div class="mkt"><strong>Your three gaps: SB · SV · BA.</strong> Every player below is sorted by which gap they fill first. Signal tags show WHY the room underprices them. Filter to zero in on exactly what you need.</div>`;

  // Filter bar
  const filters = ["ALL","SB","SV","BA","UGLY","FLOOR","ROLE","SPECL","BREAK"];
  h += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.75rem;" id="mf">
    ${filters.map((f,i)=>`<button class="fb${i===0?" fa":""}" onclick="fmid('${f}',this)">${f==="ALL"?"Show All":f}</button>`).join("")}
  </div>`;

  // Legend
  h += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.75rem;">
    ${Object.entries(SIG_META).map(([s,m])=>`<span class="pill ${m.cls}" style="font-size:9px">${s}: ${m.label}</span>`).join("")}
  </div>`;

  sections.forEach(sec => {
    const rows = MID2.filter(p => sec.pris.includes(p.pri));
    if (!rows.length) return;
    h += `<div class="shdr" style="margin-top:.5rem">${sec.label}</div>`;
    h += `<div class="tw"><table><thead><tr>
      <th style="width:17%">Player</th>
      <th style="width:5%">Tm</th>
      <th style="width:6%">Pos</th>
      <th style="width:6%">~Val</th>
      <th style="width:8%">Signal</th>
      <th style="width:5%">SB</th>
      <th style="width:5%">SV</th>
      <th style="width:5%">BA</th>
      <th style="width:5%">HR</th>
      <th>Why the room leaves money on the table</th>
    </tr></thead><tbody>`;
    rows.forEach(p => {
      const sm = SIG_META[p.sig]||{cls:"dep"};
      const vc = p.val>=18?"var(--green)":p.val>=12?"var(--amber)":"var(--text2)";
      const sbC = p.sb>=20?"color:var(--green);font-weight:700":p.sb>=10?"color:var(--amber)":"color:var(--text3)";
      const svC = p.sv>=25?"color:var(--green);font-weight:700":p.sv>=15?"color:var(--amber)":"color:var(--text3)";
      const baC = p.ba>=.280?"color:var(--green);font-weight:700":p.ba>=.260?"color:var(--amber)":"color:var(--text3)";
      h += `<tr class="mr" data-pri="${p.pri}" data-sig="${p.sig}">
        <td class="pn">${p.n}</td>
        <td class="tm">${p.tm}</td>
        <td class="tm">${p.pos}</td>
        <td class="mono" style="font-weight:700;color:${vc}">$${p.val}</td>
        <td><span class="pill ${sm.cls}">${p.sig}</span></td>
        <td class="mono" style="${sbC}">${p.sb||"—"}</td>
        <td class="mono" style="${svC}">${p.sv||"—"}</td>
        <td class="mono" style="${baC}">${p.ba?p.ba.toFixed(3):"—"}</td>
        <td class="mono" style="color:var(--text2)">${p.hr||"—"}</td>
        <td class="note-cell">${p.why}</td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  });
  return h;
}

function fmid(f, btn) {
  document.querySelectorAll("#mf .fb").forEach(b=>b.classList.remove("fa"));
  btn.classList.add("fa");
  document.querySelectorAll(".mr").forEach(row=>{
    const match = f==="ALL" || f===row.dataset.sig ||
      (f==="SB" && row.dataset.pri.startsWith("SB")) ||
      (f==="SV" && row.dataset.pri==="SV") ||
      (f==="BA" && (row.dataset.pri==="BA"||row.dataset.pri==="BA+C"||row.dataset.pri==="BA+HR"));
    row.style.display = match?"":"none";
  });
}
