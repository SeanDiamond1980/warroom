<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$30 Pool — Live Auction Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap');
:root {
  --bg:    #07090d;
  --bg2:   #0d1017;
  --bg3:   #121620;
  --bg4:   #181d28;
  --b:     #1e2535;
  --b2:    #28334a;
  --t:     #c8d4f0;
  --t2:    #6b7fa0;
  --t3:    #384562;
  --g:     #00e87a;
  --g2:    #002e18;
  --g3:    #005530;
  --r:     #ff4757;
  --r2:    #2e0008;
  --a:     #ffa502;
  --a2:    #2e1c00;
  --c:     #00d2ff;
  --c2:    #002433;
  --p:     #c77dff;
  --p2:    #1a0030;
  --mono:  'Space Mono', monospace;
  --sans:  'Syne', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:var(--sans);font-size:13px;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

/* ── HEADER ── */
header{
  background:linear-gradient(135deg,var(--bg2) 0%,#0f1520 100%);
  border-bottom:1px solid var(--b);padding:0 1.25rem;
  display:grid;grid-template-columns:auto 1fr auto;
  align-items:center;height:54px;gap:1rem;
  position:sticky;top:0;z-index:300;
}
.logo{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--g);
  letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;}
.logo span{color:var(--t3);}

/* Budget strip */
.budget-strip{display:flex;gap:0;justify-content:center;}
.bs{
  padding:0 1rem;height:54px;display:flex;flex-direction:column;
  justify-content:center;align-items:center;gap:1px;
  border-right:1px solid var(--b);
}
.bs:first-child{border-left:1px solid var(--b);}
.bs-l{font-family:var(--mono);font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;}
.bs-v{font-family:var(--mono);font-size:16px;font-weight:700;}
.bs-v.g{color:var(--g);}
.bs-v.a{color:var(--a);}
.bs-v.r{color:var(--r);}
.bs-v.c{color:var(--c);font-size:12px;}

/* Slot counter */
.slot-strip{display:flex;gap:4px;align-items:center;}
.slot{
  font-family:var(--mono);font-size:9px;padding:3px 7px;
  border-radius:3px;border:1px solid var(--b);color:var(--t3);
  background:var(--bg3);white-space:nowrap;
}
.slot.filled{border-color:var(--g3);color:var(--g);background:var(--g2);}
.slot.priority{border-color:var(--a2);color:var(--a);background:var(--a2);
  animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:340px 1fr;gap:0;height:calc(100vh - 54px);}

/* ── LEFT PANEL ── */
.left{
  background:var(--bg2);border-right:1px solid var(--b);
  display:flex;flex-direction:column;overflow:hidden;
}

/* Nomination input */
.nom-panel{padding:.85rem;border-bottom:1px solid var(--b);flex-shrink:0;}
.nom-title{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:.6rem;
  display:flex;align-items:center;gap:6px;}
.nom-title::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--g);
  animation:pulse 1.5s ease-in-out infinite;}
.input-row{display:flex;gap:6px;margin-bottom:6px;}
input[type=text],input[type=number],select{
  background:var(--bg3);border:1px solid var(--b);border-radius:4px;
  color:var(--t);font-family:var(--mono);font-size:12px;padding:7px 10px;
  outline:none;transition:border-color .15s;
}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:var(--c);}
input[type=text]{flex:1;}
input[type=number]{width:72px;}
select{flex:1;cursor:pointer;}
.btn{
  padding:7px 14px;border-radius:4px;border:none;cursor:pointer;
  font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.06em;
  transition:all .15s;white-space:nowrap;
}
.btn-g{background:var(--g3);color:var(--g);border:1px solid var(--g);}
.btn-g:hover{background:var(--g);color:var(--bg);}
.btn-r{background:var(--r2);color:var(--r);border:1px solid var(--r);}
.btn-r:hover{background:var(--r);color:#fff;}
.btn-sm{padding:4px 8px;font-size:9px;}
.search-hint{font-size:10px;color:var(--t3);margin-top:4px;font-family:var(--mono);}

/* Autocomplete */
.autocomplete{position:relative;}
.ac-drop{
  position:absolute;top:100%;left:0;right:0;z-index:500;
  background:var(--bg4);border:1px solid var(--b2);border-radius:4px;
  max-height:200px;overflow-y:auto;display:none;
}
.ac-drop.open{display:block;}
.ac-item{
  padding:7px 10px;font-family:var(--mono);font-size:11px;cursor:pointer;
  border-bottom:1px solid var(--b);display:flex;justify-content:space-between;
  transition:background .1s;
}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.selected{background:var(--b2);}
.ac-name{color:var(--t);}
.ac-meta{color:var(--t3);font-size:10px;}
.ac-val{color:var(--c);font-size:10px;}

/* My roster */
.roster-panel{flex:1;overflow-y:auto;padding:.85rem;}
.panel-hdr{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:.6rem;
  display:flex;justify-content:space-between;align-items:center;}
.roster-slot{
  display:flex;align-items:center;gap:6px;padding:5px 7px;
  border-radius:4px;margin-bottom:3px;border:1px solid var(--b);
  background:var(--bg3);min-height:32px;
}
.rs-pos{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t3);
  width:28px;flex-shrink:0;text-align:center;}
.rs-name{flex:1;font-size:12px;font-weight:600;}
.rs-sal{font-family:var(--mono);font-size:11px;color:var(--a);margin-left:auto;}
.rs-empty{color:var(--t3);font-size:11px;font-style:italic;}
.rs-keeper{color:var(--c);}
.rs-bought{color:var(--g);}
.rs-remove{font-size:9px;cursor:pointer;color:var(--t3);margin-left:4px;
  padding:1px 4px;border-radius:2px;transition:color .12s;}
.rs-remove:hover{color:var(--r);}

/* ── CATEGORY GAUGES ── */
.gauges{
  background:var(--bg3);border-bottom:1px solid var(--b);
  padding:.7rem 1rem;flex-shrink:0;
}
.gauge-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem;margin-bottom:.5rem;}
.gauge-grid-pitch{display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem;}
.gauge{display:flex;flex-direction:column;gap:3px;}
.g-label{font-family:var(--mono);font-size:8px;color:var(--t3);
  text-transform:uppercase;letter-spacing:.08em;}
.g-bar-bg{height:5px;background:var(--b);border-radius:3px;overflow:hidden;}
.g-bar{height:100%;border-radius:3px;transition:width .4s ease,background .4s ease;}
.g-nums{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;}
.g-cur{color:var(--t);}
.g-target{color:var(--t3);}
.g-pct{font-family:var(--mono);font-size:8px;font-weight:700;}

/* ── RIGHT PANEL ── */
.right{display:flex;flex-direction:column;overflow:hidden;}

/* Tabs */
.rtabs{display:flex;border-bottom:1px solid var(--b);background:var(--bg2);flex-shrink:0;}
.rtab{
  padding:0 1.1rem;height:40px;font-family:var(--mono);font-size:10px;
  font-weight:700;letter-spacing:.06em;color:var(--t3);cursor:pointer;
  border:none;background:none;border-bottom:2px solid transparent;
  transition:color .12s,border-color .12s;text-transform:uppercase;
}
.rtab:hover{color:var(--t2);}
.rtab.active{color:var(--c);border-bottom-color:var(--c);}

/* Recommendations */
.rec-panel{flex:1;overflow-y:auto;padding:.85rem;}
.rec-controls{display:flex;gap:6px;margin-bottom:.75rem;align-items:center;flex-wrap:wrap;}
.filter-btn{
  padding:4px 10px;border-radius:3px;border:1px solid var(--b);
  font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t3);
  background:var(--bg3);cursor:pointer;transition:all .12s;
}
.filter-btn.active{border-color:var(--c);color:var(--c);background:var(--c2);}
.sort-label{font-family:var(--mono);font-size:9px;color:var(--t3);margin-left:auto;}

/* Player cards */
.player-card{
  display:grid;
  grid-template-columns:28px 1fr auto auto auto 90px;
  gap:0;align-items:center;
  background:var(--bg3);border:1px solid var(--b);border-radius:5px;
  margin-bottom:4px;overflow:hidden;cursor:pointer;
  transition:border-color .12s,background .12s;
  position:relative;
}
.player-card:hover{border-color:var(--b2);background:var(--bg4);}
.player-card.deal{border-color:var(--g3);}
.player-card.deal::before{
  content:'DEAL';position:absolute;top:4px;right:4px;
  font-family:var(--mono);font-size:7px;font-weight:700;
  color:var(--g);background:var(--g2);padding:1px 4px;border-radius:2px;
  border:1px solid var(--g3);
}
.pc-rank{
  font-family:var(--mono);font-size:10px;font-weight:700;color:var(--t3);
  text-align:center;padding:0 6px;border-right:1px solid var(--b);
  align-self:stretch;display:flex;align-items:center;justify-content:center;
  background:var(--bg4);
}
.pc-info{padding:7px 10px;}
.pc-name{font-size:13px;font-weight:700;color:var(--t);line-height:1.2;}
.pc-meta{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:1px;
  display:flex;gap:8px;flex-wrap:wrap;}
.pc-cats{padding:6px 8px;display:flex;flex-direction:column;gap:3px;align-items:flex-end;}
.cat-pip{
  display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:8px;
}
.cat-dot{width:6px;height:6px;border-radius:50%;}
.cat-dot.high{background:var(--g);}
.cat-dot.med{background:var(--a);}
.cat-dot.low{background:var(--b2);}
.cat-lbl{color:var(--t3);}
.pc-proj{
  padding:6px 8px;text-align:right;border-left:1px solid var(--b);min-width:55px;
}
.pc-proj-v{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--a);}
.pc-proj-l{font-family:var(--mono);font-size:8px;color:var(--t3);}
.pc-score{
  padding:6px 10px;text-align:right;border-left:1px solid var(--b);
  background:var(--bg4);min-width:90px;
}
.pc-score-v{font-family:var(--mono);font-size:16px;font-weight:700;}
.pc-score-l{font-family:var(--mono);font-size:8px;color:var(--t3);}
.score-bar{height:3px;border-radius:2px;margin-top:3px;transition:width .3s;}

/* pill */
.pill{display:inline-block;font-family:var(--mono);font-size:8px;font-weight:700;
  padding:1px 5px;border-radius:3px;}
.p-buy{background:var(--g2);color:var(--g);border:1px solid var(--g3);}
.p-tgt{background:var(--p2);color:var(--p);border:1px solid #3a1060;}
.p-sol{background:var(--c2);color:var(--c);border:1px solid #004a60;}
.p-dep{background:var(--bg4);color:var(--t3);border:1px solid var(--b);}
.p-cau{background:var(--a2);color:var(--a);border:1px solid #503000;}

/* Auction log */
.log-panel{flex:1;overflow-y:auto;padding:.85rem;}
.log-entry{
  display:flex;align-items:center;gap:8px;padding:5px 8px;
  border-radius:4px;margin-bottom:3px;font-size:12px;
  border-left:3px solid var(--b);
}
.log-entry.mine{border-left-color:var(--g);background:rgba(0,232,122,.04);}
.log-entry.opp{border-left-color:var(--b2);}
.log-entry.deal-log{border-left-color:var(--a);background:rgba(255,165,2,.04);}
.le-num{font-family:var(--mono);font-size:9px;color:var(--t3);width:20px;flex-shrink:0;}
.le-name{font-weight:600;flex:1;}
.le-team{font-family:var(--mono);font-size:10px;color:var(--t3);}
.le-sal{font-family:var(--mono);font-size:12px;font-weight:700;}
.le-sal.mine{color:var(--g);}
.le-sal.over{color:var(--r);}
.le-sal.under{color:var(--a);}
.le-owner{font-family:var(--mono);font-size:10px;color:var(--t2);min-width:55px;text-align:right;}
.le-del{font-size:9px;cursor:pointer;color:var(--t3);padding:1px 4px;
  border-radius:2px;transition:color .12s;}
.le-del:hover{color:var(--r);}

/* Value indicator */
.val-indicator{font-family:var(--mono);font-size:9px;padding:1px 5px;
  border-radius:2px;white-space:nowrap;}
.val-deal{background:var(--g2);color:var(--g);}
.val-fair{background:var(--bg4);color:var(--t3);}
.val-over{background:var(--r2);color:var(--r);}

/* Toast */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;
  background:var(--bg4);border:1px solid var(--g);border-radius:5px;
  padding:.5rem 1rem;font-family:var(--mono);font-size:11px;color:var(--g);
  opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}

/* Nomination order */
.nom-order{background:var(--bg3);border:1px solid var(--b);border-radius:4px;
  padding:.5rem .75rem;margin-bottom:.6rem;}
.no-label{font-family:var(--mono);font-size:8px;color:var(--t3);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:4px;}
.no-teams{display:flex;gap:4px;flex-wrap:wrap;}
.no-team{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;
  border:1px solid var(--b);background:var(--bg4);color:var(--t3);cursor:default;}
.no-team.current{border-color:var(--g);color:var(--g);background:var(--g2);}
.no-team.next{border-color:var(--a);color:var(--a);}
.fb{padding:3px 9px;border-radius:3px;border:1px solid var(--border);font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t3);background:var(--bg3);cursor:pointer;margin-right:2px;}
.fa{border-color:var(--a) !important;color:var(--a) !important;background:var(--bg2) !important;}
</style>
</head>
<body>
<div id="toast"></div>

<header>
  <div class="logo">$30 Pool <span>// LIVE AUCTION</span></div>
  <div class="budget-strip">
    <div class="bs"><div class="bs-l">Total Budget</div><div class="bs-v g">$260</div></div>
    <div class="bs"><div class="bs-l">Spent</div><div class="bs-v a" id="hdr-spent">$0</div></div>
    <div class="bs"><div class="bs-l">Remaining</div><div class="bs-v g" id="hdr-rem">$142</div></div>
    <div class="bs"><div class="bs-l">Roster Slots Left</div><div class="bs-v c" id="hdr-slots">9</div></div>
    <div class="bs"><div class="bs-l">Max Per Player</div><div class="bs-v a" id="hdr-max">$134</div></div>
  </div>
  <div class="slot-strip" id="slot-strip"></div>
</header>

<div class="layout">
  <!-- LEFT PANEL -->
  <div class="left">
    <!-- Nomination order -->
    <div class="nom-panel">
      <div class="nom-title">Live Auction Input</div>

      <div class="nom-order">
        <div class="no-label">Nomination order</div>
        <div class="no-teams" id="nom-order-display"></div>
      </div>

      <!-- Player search -->
      <div style="margin-bottom:6px">
        <div class="autocomplete">
          <input type="text" id="player-input" placeholder="Search player name..." autocomplete="off"
            oninput="onPlayerSearch(this.value)" onkeydown="onSearchKey(event)"/>
          <div class="ac-drop" id="ac-drop"></div>
        </div>
        <div class="search-hint" id="search-hint">Start typing to search available players</div>
      </div>

      <div class="input-row">
        <select id="buyer-select">
          <option value="">— Buyer —</option>
          <option value="sean">sean (you)</option>
          <option value="cary">cary</option>
          <option value="eli">eli</option>
          <option value="evan">evan</option>
          <option value="foster">foster</option>
          <option value="jonnyj">jonnyj</option>
          <option value="nolan">nolan</option>
          <option value="sharon">sharon</option>
          <option value="sherk">sherk</option>
          <option value="slavens">slavens</option>
          <option value="spev">spev</option>
          <option value="steve">steve</option>
        </select>
        <input type="number" id="price-input" placeholder="$" min="1" max="260"
          onkeydown="if(event.key==='Enter')logSale()"/>
        <button class="btn btn-g" onclick="logSale()">LOG</button>
      </div>
      <button class="btn btn-r btn-sm" onclick="advanceNomination()" style="width:100%;margin-top:4px">
        ▶ NEXT NOMINATION
      </button>
    </div>

    <!-- Category gauges -->
    <div class="gauges">
      <div style="font-family:var(--mono);font-size:8px;color:var(--t3);text-transform:uppercase;
        letter-spacing:.1em;margin-bottom:.4rem;">Batting · Current → Target</div>
      <div class="gauge-grid" id="bat-gauges"></div>
      <div style="font-family:var(--mono);font-size:8px;color:var(--t3);text-transform:uppercase;
        letter-spacing:.1em;margin-bottom:.4rem;margin-top:.5rem;">Pitching · Current → Target</div>
      <div class="gauge-grid-pitch" id="pit-gauges"></div>
    </div>

    <!-- My roster -->
    <div class="roster-panel">
      <div class="panel-hdr">
        My Roster
        <button class="btn btn-r btn-sm" onclick="resetAuction()">RESET</button>
      </div>
      <div id="my-roster"></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="rtabs">
      <button class="rtab active" onclick="switchTab('recs',this)">Recommendations</button>
      <button class="rtab" onclick="switchTab('log',this)">Auction Log</button>
      <button class="rtab" onclick="switchTab('targets',this)">My Targets</button>
      <button class="rtab" onclick="switchTab('guide',this)">📖 Guide</button>
    </div>
    <div id="right-content" class="rec-panel"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────
const TOTAL_BUDGET = 260;
const KEEPER_SALARY = 102; // already committed
const PENALTIES = 16;
const AUCTION_BUDGET = TOTAL_BUDGET - KEEPER_SALARY - PENALTIES; // 142
const TEAMS = ['sean','cary','eli','evan','foster','jonnyj','nolan','sharon','sherk','slavens','spev','steve'];

// Roster slots still to fill at auction
const MY_SLOTS = [
  // CBS slot order — matches roster panel exactly
  // Keepers: filled:true  |  Open auction slots: filled:false
  {id:'C1',   label:'C',    filled:true,  keeper:'Cal Raleigh',     pos:['C']},
  {id:'C2',   label:'C',    filled:true,  keeper:'Samuel Basallo',  pos:['C']},
  {id:'1B',   label:'1B',   filled:false, keeper:null,              pos:['1B']},
  {id:'2B',   label:'2B',   filled:true,  keeper:'Luke Keaschall',  pos:['2B']},
  {id:'SS1',  label:'SS',   filled:true,  keeper:'C. Williams',     pos:['SS']},
  {id:'MI',   label:'MI',   filled:true,  keeper:'K. McGonigle',    pos:['2B','SS']},
  {id:'CI',   label:'CI',   filled:false, keeper:null,              pos:['1B','3B']},
  {id:'OF1',  label:'OF',   filled:true,  keeper:'James Wood',      pos:['OF']},
  {id:'OF2',  label:'OF',   filled:true,  keeper:'J. Merrill',      pos:['OF']},
  {id:'OF3',  label:'OF',   filled:false, keeper:null,              pos:['OF']},
  {id:'OF4',  label:'OF',   filled:false, keeper:null,              pos:['OF']},
  {id:'OF5',  label:'OF',   filled:false, keeper:null,              pos:['OF']},
  {id:'UTIL', label:'UTIL', filled:false, keeper:null,              pos:['1B','2B','3B','SS','OF']},
  {id:'P1',   label:'P',    filled:true,  keeper:'K. Gausman',      pos:['SP','RP']},
  {id:'P2',   label:'P',    filled:true,  keeper:'Eury Pérez',      pos:['SP','RP']},
  {id:'P3',   label:'P',    filled:true,  keeper:'E. Sheehan',      pos:['SP','RP']},
  {id:'P4',   label:'P',    filled:true,  keeper:'P. Messick',      pos:['SP','RP']},
  {id:'P5',   label:'P',    filled:true,  keeper:'Max Fried',       pos:['SP','RP']},
  {id:'P6',   label:'P',    filled:true,  keeper:'S. McClanahan',   pos:['SP','RP']},
  {id:'P7',   label:'P',    filled:false, keeper:null,              pos:['SP','RP']},

// STATE
// ─────────────────────────────────────────────────────────────────────────────
const STORE = 'auction_tracker_v1';
let state = {
  spent: 0,              // total I spent
  myPlayers: [],         // [{id, name, pos, price, slot}]
  soldPlayers: {},       // {playerId: {buyer, price}}
  auctionLog: [],        // [{num, id, name, buyer, price, projVal, ts}]
  nomIdx: 0,             // current nomination team index
  currentTab: 'recs',
  posFilter: 'ALL',
  myTargets: {},         // {playerId: maxPrice}
};

try {
  const saved = JSON.parse(localStorage.getItem(STORE) || 'null');
  if(saved) state = {...state, ...saved};
} catch(e){}

function save() {
  try { localStorage.setItem(STORE, JSON.stringify(state)); } catch(e){}
}

// ─────────────────────────────────────────────────────────────────────────────
// NOMINATION ORDER
// ─────────────────────────────────────────────────────────────────────────────
function renderNomOrder() {
  const el = document.getElementById('nom-order-display');
  el.innerHTML = TEAMS.map((t,i) => {
    const idx = state.nomIdx % TEAMS.length;
    const cls = i === idx ? 'no-team current' : i === (idx+1)%TEAMS.length ? 'no-team next' : 'no-team';
    return `<span class="${cls}">${t}</span>`;
  }).join('');
}

function advanceNomination() {
  state.nomIdx++;
  save();
  renderNomOrder();
  toast(`${TEAMS[state.nomIdx % TEAMS.length]}'s turn to nominate`);
}

// ─────────────────────────────────────────────────────────────────────────────
// AUTOCOMPLETE
// ─────────────────────────────────────────────────────────────────────────────
let acResults = [], acIdx = -1, selectedPlayer = null;

function onPlayerSearch(val) {
  selectedPlayer = null;
  document.getElementById('search-hint').textContent = 'Start typing to search available players';
  if(val.length < 2) { closeAc(); return; }
  const v = val.toLowerCase();
  acResults = PLAYERS.filter(p =>
    !state.soldPlayers[p.id] &&
    p.mlb !== false &&
    p.name.toLowerCase().includes(v)
  ).slice(0, 8);
  renderAc();
}

function renderAc() {
  const drop = document.getElementById('ac-drop');
  if(!acResults.length) { drop.className = 'ac-drop'; return; }
  drop.className = 'ac-drop open';
  drop.innerHTML = acResults.map((p,i) => {
    const gap = state.soldPlayers[p.id] ? '' : '';
    const ilNote = p.mlb_note && p.mlb_note.includes('IL') ? ' <span style="color:var(--a);font-size:9px">IL</span>' : '';
    return `<div class="ac-item${i===acIdx?' selected':''}" onclick="selectPlayer(${i})">
      <span class="ac-name">${p.name}${ilNote}</span>
      <span class="ac-meta">${p.tm} · ${p.pos.join('/')}</span>
      <span class="ac-val">~$${p.projVal}</span>
    </div>`;
  }).join('');
}

function onSearchKey(e) {
  if(e.key === 'ArrowDown') { acIdx = Math.min(acIdx+1, acResults.length-1); renderAc(); }
  else if(e.key === 'ArrowUp') { acIdx = Math.max(acIdx-1, 0); renderAc(); }
  else if(e.key === 'Enter' && acIdx >= 0) selectPlayer(acIdx);
  else if(e.key === 'Escape') closeAc();
}

function selectPlayer(i) {
  selectedPlayer = acResults[i];
  document.getElementById('player-input').value = selectedPlayer.name;
  const hint = document.getElementById('search-hint');
  const ilBadge = selectedPlayer.mlb_note && selectedPlayer.mlb_note.includes('IL')
    ? ` <span style="color:var(--a);font-size:10px">⚠ IL — ${selectedPlayer.mlb_note.split('—')[1]?.trim() || 'injured'}</span>`
    : '';
  hint.innerHTML = `<span style="color:var(--g)">✓ ${selectedPlayer.name}</span>${ilBadge} · ${selectedPlayer.tm} · ~$${selectedPlayer.projVal} proj value · ${selectedPlayer.pos.join('/')}`;
  closeAc();
  document.getElementById('price-input').focus();
}

function closeAc() {
  document.getElementById('ac-drop').className = 'ac-drop';
  acIdx = -1;
}

// ─────────────────────────────────────────────────────────────────────────────
// LOG SALE
// ─────────────────────────────────────────────────────────────────────────────
function logSale() {
  if(!selectedPlayer) {
    toast('⚠ Select a player from search first'); return;
  }
  if(selectedPlayer.mlb === false) {
    toast(`⛔ ${selectedPlayer.name} is not on an active MLB roster`); return;
  }
  const buyer = document.getElementById('buyer-select').value;
  const price = parseInt(document.getElementById('price-input').value);
  if(!buyer) { toast('⚠ Select a buyer'); return; }
  if(!price || price < 1) { toast('⚠ Enter a price'); return; }

  const entry = {
    num: state.auctionLog.length + 1,
    id: selectedPlayer.id,
    name: selectedPlayer.name,
    pos: selectedPlayer.pos,
    buyer,
    price,
    projVal: selectedPlayer.projVal,
    ts: Date.now(),
    isMine: buyer === 'sean',
  };

  state.auctionLog.push(entry);
  state.soldPlayers[selectedPlayer.id] = {buyer, price};

  if(buyer === 'sean') {
    state.spent += price;
    state.myPlayers.push({
      id: selectedPlayer.id,
      name: selectedPlayer.name,
      pos: selectedPlayer.pos,
      price,
      ba:   selectedPlayer.ba,
      r:    selectedPlayer.r,
      hr:   selectedPlayer.hr,
      rbi:  selectedPlayer.rbi,
      sb:   selectedPlayer.sb,
      era:  selectedPlayer.era,
      whip: selectedPlayer.whip,
      w:    selectedPlayer.w,
      k:    selectedPlayer.k,
      sv:   selectedPlayer.sv,
    });
    updateCategories();
  }

  // Advance nomination
  state.nomIdx++;
  save();

  // Clear inputs
  document.getElementById('player-input').value = '';
  document.getElementById('price-input').value = '';
  document.getElementById('buyer-select').value = '';
  document.getElementById('search-hint').textContent = 'Start typing to search available players';
  selectedPlayer = null;

  const diff = price - (entry.projVal || 0);
  const valNote = price < entry.projVal - 3 ? ' 🔥 DEAL' : price > entry.projVal + 5 ? ' OVERPAY' : '';
  toast(`${entry.name} → ${buyer} $${price}${valNote}`);

  renderAll();
}

function undoLog(idx) {
  const entry = state.auctionLog[idx];
  if(!entry) return;
  delete state.soldPlayers[entry.id];
  if(entry.isMine) {
    state.spent -= entry.price;
    state.myPlayers = state.myPlayers.filter(p => p.id !== entry.id);
    updateCategories();
  }
  state.auctionLog.splice(idx, 1);
  // renumber
  state.auctionLog.forEach((e,i) => e.num = i+1);
  save();
  renderAll();
}

// ─────────────────────────────────────────────────────────────────────────────
// CATEGORY TRACKING
// ─────────────────────────────────────────────────────────────────────────────
const KEEPER_CATS = {
  bat: { BA_sum:.245*705+.275*483+.270*689, BA_pa:705+483+689,
         R:290, HR:107, RBI:290, SB:25 },
  pit: { ERA_ers:3.36*63*0.111, ERA_ip:63, WHIP:1.10, W:63, K:870, SV:0 }
};

function updateCategories() {
  // Batting
  let ba_sum = KEEPER_CATS.bat.BA_sum, ba_pa = KEEPER_CATS.bat.BA_pa;
  let R = KEEPER_CATS.bat.R, HR = KEEPER_CATS.bat.HR;
  let RBI = KEEPER_CATS.bat.RBI, SB = KEEPER_CATS.bat.SB;

  // Pitching
  let era_ers = KEEPER_CATS.pit.ERA_ers, era_ip = KEEPER_CATS.pit.ERA_ip;
  let WHIP = KEEPER_CATS.pit.WHIP, W = KEEPER_CATS.pit.W;
  let K = KEEPER_CATS.pit.K, SV = KEEPER_CATS.pit.SV;

  state.myPlayers.forEach(p => {
    if(false) return;
    const pr = p;
    if(pr.ba !== null) {
      const pa_est = 550;
      ba_sum += pr.ba * pa_est; ba_pa += pa_est;
      R += pr.r||0; HR += pr.hr||0; RBI += pr.rbi||0; SB += pr.sb||0;
    } else {
      // pitcher
      const ip_est = pr.w ? pr.w * 6.5 : 60;
      era_ers += (pr.era||3.80) * ip_est / 9;
      era_ip += ip_est;
      W += pr.w||0; K += pr.k||0; SV += pr.sv||0;
      // rough WHIP blend
      WHIP = (WHIP * (era_ip - ip_est) + (pr.whip||1.25) * ip_est) / era_ip;
    }
  });

  CAT_TARGETS.bat.BA.cur = ba_pa > 0 ? ba_sum / ba_pa : 0;
  CAT_TARGETS.bat.R.cur = R;
  CAT_TARGETS.bat.HR.cur = HR;
  CAT_TARGETS.bat.RBI.cur = RBI;
  CAT_TARGETS.bat.SB.cur = SB;

  CAT_TARGETS.pit.ERA.cur = era_ip > 0 ? (era_ers * 9 / era_ip) : 0;
  CAT_TARGETS.pit.WHIP.cur = WHIP;
  CAT_TARGETS.pit.W.cur = W;
  CAT_TARGETS.pit.K.cur = K;
  CAT_TARGETS.pit.SV.cur = SV;
}

function renderGauges() {
  function gaugeHTML(cat, info) {
    const {cur, target, label, fmt, lower} = info;
    let pct = lower
      ? Math.max(0, Math.min(100, ((target - (cur - target)) / target) * 100))
      : Math.max(0, Math.min(100, (cur / target) * 100));
    const color = pct >= 80 ? 'var(--g)' : pct >= 50 ? 'var(--a)' : 'var(--r)';
    const pctDisp = lower
      ? (cur <= target ? Math.round(100 - Math.abs(cur-target)/target*100) + '%' : '⚠')
      : Math.round(pct) + '%';
    return `<div class="gauge">
      <div class="g-label">${label}</div>
      <div class="g-bar-bg"><div class="g-bar" style="width:${pct}%;background:${color}"></div></div>
      <div class="g-nums">
        <span class="g-cur">${fmt(cur)}</span>
        <span class="g-target">${fmt(target)}</span>
      </div>
      <div class="g-pct" style="color:${color}">${pctDisp}</div>
    </div>`;
  }

  document.getElementById('bat-gauges').innerHTML =
    Object.entries(CAT_TARGETS.bat).map(([k,v]) => gaugeHTML(k,v)).join('');
  document.getElementById('pit-gauges').innerHTML =
    Object.entries(CAT_TARGETS.pit).map(([k,v]) => gaugeHTML(k,v)).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// SCORING ENGINE — recalculates every render
// ─────────────────────────────────────────────────────────────────────────────
function scorePlayer(p) {
  if(state.soldPlayers[p.id]) return 0;

  // Position need check — count open auction slots that fit this player
  // Only consider open auction slots (keepers already filled, don't recommend for them)
  const wonSlotIds = new Set(state.myPlayers.map(mp => mp.slot));
  const openSlots = MY_SLOTS.filter(s => {
    if(s.filled) return false;           // keeper slot, already spoken for
    if(wonSlotIds.has(s.id)) return false; // already won a player for this slot
    return s.pos && s.pos.some(sp => p.pos.includes(sp));
  });
  // If no open slots can fit this player, severely penalize
  if(openSlots.length === 0) return -1;

  // Base Statcast quality score (0-100)
  let base = 0;
  if(p.ba !== null) {
    const xw = p.xwoba || .320;
    base = Math.min(100, (xw - .270) * 500);
  } else {
    const xe = p.xera || 4.00;
    base = Math.min(100, Math.max(0, (5.00 - xe) * 30));
  }

  // Tag bonus
  const tagBonus = {buy:15, tgt:8, sol:3, dep:-5, cau:-10}[p.tag] || 0;

  // Scarcity bonus — fewer open slots = more urgent
  const scarcityBonus = openSlots.length <= 1 ? 10 : openSlots.length <= 2 ? 5 : 0;

  // Category gap multipliers
  let catBonus = 0;
  if(p.ba !== null) {
    const targets = CAT_TARGETS.bat;
    const sbGap   = Math.max(0, targets.SB.target  - targets.SB.cur);
    const hrGap   = Math.max(0, targets.HR.target  - targets.HR.cur);
    const rGap    = Math.max(0, targets.R.target   - targets.R.cur);
    const baGap   = Math.max(0, targets.BA.target  - targets.BA.cur);

    if(p.sb) catBonus += (p.sb / Math.max(sbGap, 1)) * 30;
    if(p.hr) catBonus += (p.hr / Math.max(hrGap, 1)) * 20;
    if(p.r)  catBonus += (p.r  / Math.max(rGap, 1))  * 15;
    if(p.ba) catBonus += ((p.ba - .240) / Math.max(baGap, .001)) * 10;
  } else {
    const targets = CAT_TARGETS.pit;
    const svGap = Math.max(0, targets.SV.target - targets.SV.cur);
    const kGap  = Math.max(0, targets.K.target  - targets.K.cur);
    const wGap  = Math.max(0, targets.W.target  - targets.W.cur);

    if(p.sv) catBonus += (p.sv / Math.max(svGap, 1)) * 40;
    if(p.k)  catBonus += (p.k  / Math.max(kGap, 1))  * 20;
    if(p.w)  catBonus += (p.w  / Math.max(wGap, 1))  * 15;
  }

  return Math.round(base + tagBonus + scarcityBonus + Math.min(catBonus, 50));
}

// ─────────────────────────────────────────────────────────────────────────────
// HEADER + SLOTS
// ─────────────────────────────────────────────────────────────────────────────
function renderHeader() {
  const rem = AUCTION_BUDGET - state.spent;
  // Only count open AUCTION slots (not pre-filled keepers)
  const auctionSlots = MY_SLOTS.filter(s => !s.filled);
  const slotsLeft = auctionSlots.length - state.myPlayers.length;
  const maxPer = slotsLeft > 0 ? rem - (slotsLeft - 1) : 0;

  document.getElementById('hdr-spent').textContent = '$' + state.spent;
  const remEl = document.getElementById('hdr-rem');
  remEl.textContent = '$' + rem;
  remEl.className = 'bs-v ' + (rem > 50 ? 'g' : rem > 20 ? 'a' : 'r');
  document.getElementById('hdr-slots').textContent = slotsLeft;
  document.getElementById('hdr-max').textContent = '$' + Math.max(1, maxPer);

  // Slot strip — keepers shown as already filled, auction wins tracked separately
  const strip = document.getElementById('slot-strip');
  const svGap = CAT_TARGETS.pit.SV.target - CAT_TARGETS.pit.SV.cur;
  const sbGap = CAT_TARGETS.bat.SB.target - CAT_TARGETS.bat.SB.cur;
  let auctionIdx = 0;

  strip.innerHTML = MY_SLOTS.map(s => {
    if(s.filled) {
      // Keeper slot — always show as filled with keeper name
      return `<span class="slot filled" title="${s.keeper}">${s.label}✓</span>`;
    }
    // Auction slot — check if filled by a won player
    const won = state.myPlayers[auctionIdx];
    auctionIdx++;
    if(won) return `<span class="slot filled">${s.label}✓</span>`;
    const isPri = (s.label === 'RP' && svGap > 40) || (s.label === 'OF' && sbGap > 40);
    return `<span class="slot${isPri ? ' priority' : ''}">${s.label}</span>`;
  }).join('');
}

  const p = state.myPlayers[idx];
  if(!p) return;
  state.spent -= p.price;
  delete state.soldPlayers[p.id];
  state.auctionLog = state.auctionLog.filter(e => e.id !== p.id);
  state.auctionLog.forEach((e,i) => e.num = i+1);
  state.myPlayers.splice(idx, 1);
  updateCategories();
  save();
  renderAll();
}

// ─────────────────────────────────────────────────────────────────────────────
// RECOMMENDATIONS
// ─────────────────────────────────────────────────────────────────────────────
function renderRecs() {
  if(state.posFilter==='VALUE') { return renderValueLayer(); }
  const avail = PLAYERS.filter(p => !state.soldPlayers[p.id] && !p.kept_by);
  const filter = state.posFilter;

  const filtered = filter === 'ALL' ? avail :
    filter === 'BAT' ? avail.filter(p => p.ba !== null) :
    filter === 'PIT' ? avail.filter(p => p.ba === null) :
    filter === 'SLEEP' ? avail.filter(p => p.sleep) :
    avail.filter(p => p.pos.includes(filter));

  const scored = filtered.map(p => ({...p, score: scorePlayer(p)}))
    .filter(p => p.score >= 0)
    .sort((a,b) => b.score - a.score);

  const maxScore = Math.max(...scored.map(p => p.score), 1);
  const rem = AUCTION_BUDGET - state.spent;

  let html = `<div class="rec-controls">
    ${['ALL','BAT','PIT','C','1B','2B','3B','SS','OF','SP','RP'].map(f =>
      `<button class="filter-btn${state.posFilter===f?' active':''}" onclick="setFilter('${f}')">${f}</button>`
    ).join('')}
    <button class="filter-btn${state.posFilter==='SLEEP'?' active':''}" onclick="setFilter('SLEEP')" style="background:#1a2a1a;border-color:#5BAD6F;color:#5BAD6F;font-weight:900;margin-left:8px;">💤 $1-3 SLEEPERS</button>
    <button class="filter-btn${state.posFilter==='VALUE'?' active':''}" onclick="setFilter('VALUE')" style="background:var(--bg2);border-color:#E8A838;color:#E8A838;font-weight:900;">$5-15 ★</button>
    <span class="sort-label">Ranked by: Skill × Category Need × Value</span>
  </div>`;

  scored.forEach((p, i) => {
    const isSold = !!state.soldPlayers[p.id];
    if(isSold) return;

    const pct = Math.round((p.score / maxScore) * 100);
    const scoreColor = pct >= 75 ? 'var(--g)' : pct >= 50 ? 'var(--a)' : 'var(--t3)';

    // Category contributions
    const cats = [];
    if(p.ba !== null) {
      const sbGap = CAT_TARGETS.bat.SB.target - CAT_TARGETS.bat.SB.cur;
      const hrGap = CAT_TARGETS.bat.HR.target - CAT_TARGETS.bat.HR.cur;
      if(p.sb >= 15) cats.push({label:'SB', cls: sbGap > 30 ? 'high' : 'med'});
      if(p.hr >= 25) cats.push({label:'HR', cls: hrGap > 60 ? 'high' : 'med'});
      if(p.ba >= .275) cats.push({label:'BA', cls:'med'});
      if(p.r >= 85)  cats.push({label:'R', cls:'med'});
    } else {
      const svGap = CAT_TARGETS.pit.SV.target - CAT_TARGETS.pit.SV.cur;
      if(p.sv >= 20) cats.push({label:'SV', cls: svGap > 50 ? 'high' : 'med'});
      if(p.k >= 170) cats.push({label:'K', cls:'med'});
      if(p.era <= 3.20) cats.push({label:'ERA', cls:'high'});
    }

    // Value signal
    const isTarget = state.myTargets[p.id];
    const projDiff = isTarget ? isTarget - p.projVal : 0;

    const pillHtml = `<span class="pill p-${p.tag}">${p.tag.toUpperCase()}</span>`;

    html += `<div class="player-card${p.tag==='buy'&&pct>=70?' deal':''}" onclick="quickBid('${p.id}')">
      <div class="pc-rank" style="color:${scoreColor}">${i+1}</div>
      <div class="pc-info">
        <div class="pc-name">${p.name} ${pillHtml}</div>
        <div class="pc-meta">
          <span>${p.tm}</span>
          <span>${p.pos.join('/')}</span>
          ${p.ba!==undefined ? `<span>${(p.ba||0).toFixed(3)} / ${p.hr}HR / ${p.sb}SB</span>` : `<span>${(p.era != null ? p.era.toFixed(2) : '—')||'—'} ERA / ${p.k||'—'}K / ${p.sv||0}SV</span>`}
        </div>
      </div>
      <div class="pc-cats">${cats.map(c => `<div class="cat-pip"><div class="cat-dot ${c.cls}"></div><span class="cat-lbl">${c.label}</span></div>`).join('')}</div>
      <div class="pc-proj">
        <div class="pc-proj-v">$${p.projVal}</div>
        <div class="pc-proj-l">proj val</div>
        ${isTarget ? `<div style="font-family:var(--mono);font-size:9px;color:var(--a)">Max $${isTarget}</div>` : ''}
      </div>
      <div class="pc-score">
        <div class="pc-score-v" style="color:${scoreColor}">${p.score}</div>
        <div class="pc-score-l">war room score</div>
        <div class="score-bar" style="width:${pct}%;background:${scoreColor}"></div>
      </div>
    </div>`;
  });

  if(!scored.length) html += '<div style="padding:2rem;text-align:center;color:var(--t3);font-family:var(--mono)">No players found</div>';

  return html;
}

function setFilter(f) {
  state.posFilter = f;
  save();

  renderRightPanel();
}

function quickBid(playerId) {
  const p = PLAYERS.find(x => x.id === playerId);
  if(!p) return;
  selectedPlayer = p;
  document.getElementById('player-input').value = p.name;
  document.getElementById('price-input').value = p.projVal;
  document.getElementById('search-hint').innerHTML =
    `<span style="color:var(--g)">✓ ${p.name}</span> · ${p.tm} · ~$${p.projVal} proj value`;
  document.getElementById('price-input').focus();
  document.getElementById('price-input').select();
}

// ─────────────────────────────────────────────────────────────────────────────
// AUCTION LOG
// ─────────────────────────────────────────────────────────────────────────────
function renderLog() {
  if(!state.auctionLog.length) {
    return '<div style="padding:2rem;text-align:center;color:var(--t3);font-family:var(--mono)">No sales logged yet</div>';
  }

  const entries = [...state.auctionLog].reverse();
  return entries.map((e, revIdx) => {
    const realIdx = state.auctionLog.length - 1 - revIdx;
    const diff = e.price - e.projVal;
    const valCls = diff < -3 ? 'val-deal' : diff > 5 ? 'val-over' : 'val-fair';
    const valTxt = diff < -3 ? `DEAL -$${Math.abs(diff)}` : diff > 5 ? `OVER +$${diff}` : 'FAIR';
    const cls = e.isMine ? 'log-entry mine' : diff < -5 ? 'log-entry deal-log' : 'log-entry opp';
    const salCls = e.isMine ? 'le-sal mine' : diff > 5 ? 'le-sal over' : diff < -5 ? 'le-sal under' : 'le-sal';
    return `<div class="${cls}">
      <span class="le-num">#${e.num}</span>
      <span class="le-name">${e.name}</span>
      <span class="le-team">${e.pos?.[0]||''}</span>
      <span class="val-indicator ${valCls}">${valTxt}</span>
      <span class="${salCls}">$${e.price}</span>
      <span class="le-owner">${e.buyer}</span>
      <span class="le-del" onclick="undoLog(${realIdx})">✕</span>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// MY TARGETS
// ─────────────────────────────────────────────────────────────────────────────
function renderTargets() {
  const avail = PLAYERS.filter(p => !state.soldPlayers[p.id] && !p.kept_by);
  const rem = AUCTION_BUDGET - state.spent;

  let html = `<div style="margin-bottom:.75rem">
    <div style="font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;
      letter-spacing:.1em;margin-bottom:.5rem">Set max bid for players you want</div>
    <div style="font-size:11.5px;color:var(--t2);margin-bottom:.5rem">
      Remaining budget: <strong style="color:var(--g)">$${rem}</strong> · 
      Slots left: <strong style="color:var(--c)">${MY_SLOTS.length - state.myPlayers.length}</strong> ·
      Max safe per player: <strong style="color:var(--a)">$${Math.max(1, rem - (MY_SLOTS.length - state.myPlayers.length - 1))}</strong>
    </div>
  </div>`;

  // Priority targets based on current gaps
  const svGap = CAT_TARGETS.pit.SV.target - CAT_TARGETS.pit.SV.cur;
  const sbGap = CAT_TARGETS.bat.SB.target - CAT_TARGETS.bat.SB.cur;

  if(svGap > 40) {
    html += `<div style="background:var(--r2);border:1px solid var(--r);border-radius:4px;padding:.5rem .75rem;
      margin-bottom:.75rem;font-family:var(--mono);font-size:10px;color:var(--r)">
      ⚠ SAVES CRITICAL — ${Math.round(svGap)} saves still needed. Prioritize: Hader, Clase, Weaver
    </div>`;
  }
  if(sbGap > 40) {
    html += `<div style="background:var(--a2);border:1px solid var(--a);border-radius:4px;padding:.5rem .75rem;
      margin-bottom:.75rem;font-family:var(--mono);font-size:10px;color:var(--a)">
      ⚠ SB GAP — ${Math.round(sbGap)} stolen bases still needed. Prioritize speed players
    </div>`;
  }

  // Target setter
  const priorityIds = ['hader','weaver','clase','tatis','chisholm','ohtani','soto','guerrero','wheeler','cease','gray'];
  const showPlayers = avail.filter(p => priorityIds.includes(p.id) || state.myTargets[p.id]);
  const otherAvail = avail.filter(p => !priorityIds.includes(p.id) && !state.myTargets[p.id]).slice(0,20);

  html += `<div style="font-family:var(--mono);font-size:8.5px;color:var(--t3);text-transform:uppercase;
    letter-spacing:.1em;margin-bottom:.5rem">Priority targets</div>`;

  [...showPlayers, ...otherAvail].forEach(p => {
    const maxBid = state.myTargets[p.id] || '';
    const diff = maxBid ? maxBid - p.projVal : null;
    const valNote = diff !== null ? (diff > 3 ? `<span style="color:var(--a);font-size:9px;margin-left:6px">+$${diff} over proj</span>` : diff < -3 ? `<span style="color:var(--g);font-size:9px;margin-left:6px">-$${Math.abs(diff)} below proj</span>` : '') : '';
    html += `<div style="display:flex;align-items:center;gap:8px;padding:5px 7px;
      border-radius:4px;margin-bottom:3px;background:var(--bg3);border:1px solid var(--b)">
      <span style="font-size:12px;font-weight:600;flex:1">${p.name}</span>
      <span style="font-family:var(--mono);font-size:9px;color:var(--t3)">${p.tm} · $${p.projVal} proj</span>
      ${valNote}
      <input type="number" placeholder="Max $" min="1" max="260" value="${maxBid}"
        style="width:68px;font-size:11px;"
        onchange="setTarget('${p.id}',this.value)"
        oninput="setTarget('${p.id}',this.value)"/>
    </div>`;
  });

  return html;
}

function setTarget(id, val) {
  const v = parseInt(val);
  if(v > 0) state.myTargets[id] = v;
  else delete state.myTargets[id];
  save();
  if(state.currentTab === 'recs') renderRightPanel();
}

function switchTab(tab, btn) {
  state.currentTab = tab;
  document.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById('right-content');
  panel.className = tab === 'recs' ? 'rec-panel' : tab === 'guide' ? 'rec-panel' : 'log-panel';
  renderRightPanel();
}

function renderRightPanel() {
  const el = document.getElementById('right-content');
  if(state.currentTab === 'recs')         el.innerHTML = renderRecs();
  else if(state.currentTab === 'log')     el.innerHTML = renderLog();
  else if(state.currentTab === 'targets') el.innerHTML = renderTargets();
  else if(state.currentTab === 'guide')   el.innerHTML = renderGuide();
}

const VL_SIG = {
  UGLY:  {cls:"buy",  label:"Ugly Stats / Good Skills"},
  FLOOR: {cls:"sol",  label:"Reliable Floor"},
  ROLE:  {cls:"tgt",  label:"Role Upgrade 2026"},
  SPECL: {cls:"cau",  label:"Category Specialist"},
  BREAK: {cls:"buy",  label:"Breakout Signal"},
  SLEEP: {cls:"buy",  label:"$1-$3 Sleeper"},
};

function scoreValuePlayer(p) {
  // Read LIVE gaps from the tracker's own CAT_TARGETS
  const batT = CAT_TARGETS.bat;
  const pitT = CAT_TARGETS.pit;

  const sbGap  = Math.max(1, batT.SB.target  - batT.SB.cur);
  const baGap  = Math.max(.001, batT.BA.target - batT.BA.cur);
  const hrGap  = Math.max(1, batT.HR.target  - batT.HR.cur);
  const rGap   = Math.max(1, batT.R.target   - batT.R.cur);
  const svGap  = Math.max(1, pitT.SV.target  - pitT.SV.cur);
  const kGap   = Math.max(1, pitT.K.target   - pitT.K.cur);
  const wGap   = Math.max(1, pitT.W.target   - pitT.W.cur);

  let score = 0;
  const pr = p;

  // Batter scoring — exactly mirrors the tracker's catBonus logic
  if (pr.ba !== null) {
    if (pr.sb) score += (pr.sb / sbGap) * 40;        // SB weighted most
    if (pr.ba) score += ((pr.ba - .240) / baGap) * 25;
    if (pr.hr) score += (pr.hr / hrGap) * 15;
    if (pr.r)  score += (pr.r  / rGap)  * 10;
  } else {
    // Pitcher
    if (pr.sv) score += (pr.sv / svGap) * 50;        // SV heavily weighted
    if (pr.k)  score += (pr.k  / kGap)  * 20;
    if (pr.w)  score += (pr.w  / wGap)  * 15;
    if (pr.era !== undefined) score += ((4.00 - pr.era) / 0.5) * 10;
  }

  return score;
}

function getGapLabel() {
  const batT = CAT_TARGETS.bat;
  const pitT = CAT_TARGETS.pit;
  const sbGap = Math.max(0, batT.SB.target - batT.SB.cur);
  const svGap = Math.max(0, pitT.SV.target - pitT.SV.cur);
  const baGap = Math.max(0, batT.BA.target - batT.BA.cur);

  // Determine top priority
  const sbUrgency = sbGap / batT.SB.target;
  const svUrgency = svGap / pitT.SV.target;
  const baUrgency = baGap / Math.max(batT.BA.target, .001);

  const top = sbUrgency >= svUrgency && sbUrgency >= baUrgency ? 'SB'
            : svUrgency >= baUrgency ? 'SV' : 'BA';

  return {
    sb: Math.round(sbGap), sv: Math.round(svGap),
    ba: baGap.toFixed(3), top,
    sbUrgency, svUrgency, baUrgency
  };
}

function renderValueLayer() {
  const gaps = getGapLabel();
  const sold = new Set(Object.keys(state.soldPlayers || {}));

  // Filter out players already drafted
  const avail = VALUE_PLAYERS.filter(p => !sold.has(p.n.toLowerCase().replace(/\s+/g,'-')));

  // Score and sort live
  const scored = avail
    .map(p => ({...p, score: scoreValuePlayer(p)}))
    .sort((a,b) => b.score - a.score);

  // Gap status bar
  const urgBar = (label, gap, urgency, color) => {
    const pct = Math.min(100, urgency * 100);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <span style="font-family:var(--mono);font-size:10px;font-weight:700;width:30px;color:${color}">${label}</span>
      <div style="flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;">
        <div style="width:${pct}%;height:100%;background:${color};border-radius:3px;transition:width .4s;"></div>
      </div>
      <span style="font-family:var(--mono);font-size:10px;color:${color};min-width:60px">
        ${label==='BA' ? `need +${gap}` : `need ${gap} more`}
      </span>
    </div>`;
  };

  const sbColor = gaps.sbUrgency > .5 ? '#E85D5D' : gaps.sbUrgency > .25 ? '#E8A838' : '#5BAD6F';
  const svColor = gaps.svUrgency > .5 ? '#E85D5D' : gaps.svUrgency > .25 ? '#E8A838' : '#5BAD6F';
  const baColor = gaps.baUrgency > .3 ? '#E85D5D' : gaps.baUrgency > .1 ? '#E8A838' : '#5BAD6F';

  let h = `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:.75rem;margin-bottom:.75rem;">
    <div style="font-family:var(--mono);font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem;">LIVE GAP STATUS — sorted by priority</div>
    ${urgBar('SB',  gaps.sb, gaps.sbUrgency, sbColor)}
    ${urgBar('SV',  gaps.sv, gaps.svUrgency, svColor)}
    ${urgBar('BA',  gaps.ba, gaps.baUrgency, baColor)}
    <div style="margin-top:.5rem;font-size:10px;color:var(--t2);">
      ↑ List below re-ranks automatically as you win players. 
      <strong style="color:${gaps.top==='SB'?sbColor:gaps.top==='SV'?svColor:baColor}">Top priority right now: ${gaps.top}</strong>
    </div>
  </div>`;

  // Filter row
  const initFilter = state.posFilter === 'SLEEP' ? 'SLEEP' : 'ALL';
  h += `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.75rem;" id="vl-filters">
    ${["ALL","SB","SV","BA","SP","UGLY","FLOOR","ROLE","SPECL","BREAK","SLEEP"].map((f,i)=>
      `<button class="fb${f===initFilter?' fa':''}" onclick="vlFilter('${f}',this)">${f}</button>`
    ).join('')}
  </div>`;

  h += `<table style="width:100%;border-collapse:collapse;table-layout:fixed"><thead><tr>
    <th style="width:18%;font-size:10px;font-weight:600;color:var(--t3);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)">Player</th>
    <th style="width:5%;font-size:10px;font-weight:600;color:var(--t3);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)">Tm</th>
    <th style="width:7%;font-size:10px;font-weight:600;color:var(--t3);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)">Pos</th>
    <th style="width:6%;font-size:10px;font-weight:600;color:var(--t3);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)">~Val</th>
    <th style="width:8%;font-size:10px;font-weight:600;color:var(--t3);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)">Signal</th>
    <th style="width:5%;font-size:10px;font-weight:600;color:${sbColor};text-align:center;padding:4px 6px;border-bottom:1px solid var(--border)">SB</th>
    <th style="width:5%;font-size:10px;font-weight:600;color:${svColor};text-align:center;padding:4px 6px;border-bottom:1px solid var(--border)">SV</th>
    <th style="width:5%;font-size:10px;font-weight:600;color:${baColor};text-align:center;padding:4px 6px;border-bottom:1px solid var(--border)">BA</th>
    <th style="font-size:10px;font-weight:600;color:var(--t3);text-align:left;padding:4px 6px;border-bottom:1px solid var(--border)">Why room underprices this player</th>
  </tr></thead><tbody id="vl-body">`;

  scored.forEach((p, idx) => {
    const sm = VL_SIG[p.sig] || {cls:'dep'};
    const vc = p.val>=18?'#5BAD6F':p.val>=12?'#E8A838':'var(--t2)';
    const isPit = !p.ba && p.ba !== 0;
    const sbV = p.sb;
    const svV = p.sv;
    const baV = p.ba;
    const sbStyle = sbV>=20?`color:${sbColor};font-weight:700`:sbV>=10?`color:var(--t2)`:`color:var(--t3)`;
    const svStyle = svV>=25?`color:${svColor};font-weight:700`:svV>=15?`color:var(--t2)`:`color:var(--t3)`;
    const baStyle = baV>=.280?`color:${baColor};font-weight:700`:baV>=.260?`color:var(--t2)`:`color:var(--t3)`;
    // Rank indicator — top 3 in current sort get a dot
    const rankDot = idx < 3 ? `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${gaps.top==='SB'?sbColor:gaps.top==='SV'?svColor:baColor};margin-right:5px;vertical-align:middle;"></span>` : '';
    const posType = isPit ? 'PIT' : 'BAT';
    h += `<tr class="vl-row" data-sig="${p.sig}" data-pos="${posType}" data-pri="${p.sv?'SV':p.sb>=10?'SB':p.ba>=.270?'BA':'MULTI'}"
      style="border-bottom:1px solid var(--border);cursor:default;">
      <td style="padding:5px 6px;font-weight:600;font-size:12px;">${rankDot}${p.n}</td>
      <td style="padding:5px 6px;font-family:var(--mono);font-size:10px;color:var(--t3)">${p.tm}</td>
      <td style="padding:5px 6px;font-family:var(--mono);font-size:10px;color:var(--t3)">${p.pos}</td>
      <td style="padding:5px 6px;font-family:var(--mono);font-weight:700;color:${vc}">$${p.val}</td>
      <td style="padding:5px 6px"><span class="tag ${sm.cls}">${p.sig}</span></td>
      <td style="padding:5px 6px;font-family:var(--mono);font-size:11px;text-align:center;${sbStyle}">${sbV||'—'}</td>
      <td style="padding:5px 6px;font-family:var(--mono);font-size:11px;text-align:center;${svStyle}">${svV||'—'}</td>
      <td style="padding:5px 6px;font-family:var(--mono);font-size:11px;text-align:center;${baStyle}">${baV?baV.toFixed(3):'—'}</td>
      <td style="padding:5px 6px;font-size:11px;color:var(--t2);white-space:normal;line-height:1.4">${p.why}</td>
    </tr>`;
  });

  h += `</tbody></table>`;
  return h;
}

function vlFilter(f, btn) {
  document.querySelectorAll('#vl-filters .fb').forEach(b=>b.classList.remove('fa'));
  btn.classList.add('fa');
  document.querySelectorAll('.vl-row').forEach(row => {
    const sig = row.dataset.sig, pos = row.dataset.pos, pri = row.dataset.pri;
    const show = f==='ALL'
      || f===sig
      || (f==='SB' && pri==='SB')
      || (f==='SV' && pri==='SV')
      || (f==='BA' && pri==='BA')
      || (f==='SP' && pos==='PIT');
    row.style.display = show ? '' : 'none';
  });
}
